// ─── UTILS ───────────────────────────────────────────────────────────────────

function getInverseWeight(pts) { return Math.max(1, 100 - pts * 3); }

function buildSegments(soldiers) {
  const total = soldiers.reduce((s,m) => s + getInverseWeight(m.totalPoints), 0);
  let cum = 0;
  return soldiers.map(m => {
    const w = getInverseWeight(m.totalPoints);
    const start = cum / total, end = (cum + w) / total;
    cum += w;
    return { ...m, start, end, pct: ((w/total)*100).toFixed(1) };
  });
}
function pickWinner(segs) {
  const r = Math.random();
  return segs.find(s => r >= s.start && r < s.end) || segs[segs.length-1];
}

function useSaucisseImg() {
  const [img, setImg] = useState(null);
  useEffect(() => {
    const image = new Image();
    image.onload = () => setImg(image);
    image.src = SAUCISSE_URL;
  }, []);
  return img;
}

function drawSaucisseImg(ctx, img, x, y, angle, scale = 1) {
  if (!img) return;
  const w = 88 * scale, h = 88 * scale;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  ctx.restore();
}

// stub vide — ne sera plus appelé
function drawSaucisseSvg(ctx, x, y, angle, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  const lw = 2.2; // épaisseur contour cartoon

  // ── AILE (au-dessus du corps) ──
  // Base de l'aile ancrée au milieu-haut du corps
  ctx.save();
  ctx.translate(-4, -10);

  // Fond commun de l'aile (forme globale)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-2, -18, 8, -36, 18, -42);
  ctx.bezierCurveTo(26, -44, 30, -38, 24, -30);
  ctx.bezierCurveTo(20, -24, 10, -16, 0, 0);
  ctx.closePath();
  ctx.fillStyle = "#EDE0C4";
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = lw;
  ctx.fill(); ctx.stroke();

  // Plumes individuelles (5 plumes du bas vers le haut)
  const feathers = [
    // [base_x, base_y, tip_x, tip_y, ctrl1x, ctrl1y, ctrl2x, ctrl2y, width]
    { bx:0,   by:0,   tx:6,  ty:-16, leanX: 4,  fill:"#F0E5CC" },
    { bx:-1,  by:-4,  tx:10, ty:-22, leanX: 6,  fill:"#EDE0C4" },
    { bx:0,   by:-9,  tx:14, ty:-28, leanX: 8,  fill:"#EAD9BC" },
    { bx:1,   by:-14, tx:18, ty:-34, leanX: 9,  fill:"#E8D6B6" },
    { bx:3,   by:-19, tx:20, ty:-40, leanX: 9,  fill:"#E5D2B0" },
  ];

  feathers.forEach(f => {
    const hw = 5; // demi-largeur base plume
    ctx.beginPath();
    ctx.moveTo(f.bx - hw * 0.5, f.by);
    ctx.quadraticCurveTo(f.tx - f.leanX, (f.by + f.ty)/2, f.tx, f.ty);
    ctx.quadraticCurveTo(f.tx + f.leanX * 0.3, (f.by + f.ty)/2, f.bx + hw * 0.5, f.by);
    ctx.closePath();
    ctx.fillStyle = f.fill;
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = lw * 0.7;
    ctx.fill(); ctx.stroke();
    // nervure centrale
    ctx.beginPath();
    ctx.moveTo(f.bx, f.by);
    ctx.quadraticCurveTo(f.bx + f.leanX * 0.4, (f.by*0.4 + f.ty*0.6), f.tx, f.ty);
    ctx.strokeStyle = "#ccc0a0";
    ctx.lineWidth = 0.7;
    ctx.stroke();
  });

  ctx.restore();

  // ── CORPS SAUCISSE ──
  // Forme arrondie cartoon (pas une ellipse parfaite — légèrement courbée)
  ctx.save();

  // Dégradé beige → brun comme les refs
  const grd = ctx.createLinearGradient(0, -13, 0, 13);
  grd.addColorStop(0,   "#D9A878");
  grd.addColorStop(0.4, "#C8946A");
  grd.addColorStop(0.8, "#B07850");
  grd.addColorStop(1,   "#9A6440");

  // Corps principal (arrondi des deux côtés)
  ctx.beginPath();
  ctx.moveTo(-24, -8);
  ctx.bezierCurveTo(-32, -12, -34, -4, -34, 2);
  ctx.bezierCurveTo(-34, 10, -28, 14, -20, 13);
  ctx.bezierCurveTo(-4, 16, 12, 16, 22, 13);
  ctx.bezierCurveTo(30, 10, 32, 4, 32, -1);
  ctx.bezierCurveTo(32, -8, 28, -13, 20, -13);
  ctx.bezierCurveTo(4, -14, -10, -12, -24, -8);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = lw;
  ctx.fill(); ctx.stroke();

  // Reflet lumineux
  ctx.beginPath();
  ctx.ellipse(-6, -5, 14, 4, -0.2, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,240,210,0.30)";
  ctx.fill();

  // Petit bout gauche (extrémité noueuse)
  ctx.beginPath();
  ctx.moveTo(-28, -4);
  ctx.bezierCurveTo(-38, -6, -40, 2, -36, 6);
  ctx.bezierCurveTo(-34, 10, -28, 8, -26, 4);
  ctx.fillStyle = "#A06840";
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = lw;
  ctx.fill(); ctx.stroke();

  // Petit bout droit
  ctx.beginPath();
  ctx.moveTo(26, -3);
  ctx.bezierCurveTo(36, -5, 38, 3, 34, 7);
  ctx.bezierCurveTo(32, 10, 26, 8, 24, 4);
  ctx.fillStyle = "#A06840";
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = lw;
  ctx.fill(); ctx.stroke();

  // Œil rigolo
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-18, -2, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = lw*0.6; ctx.stroke();
  ctx.fillStyle = "#1a1a1a";
  ctx.beginPath(); ctx.arc(-17, -2, 2, 0, Math.PI*2); ctx.fill();
  // reflet œil
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-16, -3, 0.8, 0, Math.PI*2); ctx.fill();

  // Petit sourire
  ctx.beginPath();
  ctx.arc(-10, 1, 5, 0.2, Math.PI - 0.2);
  ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = lw*0.7;
  ctx.stroke();

  ctx.restore();
  ctx.restore();
}

// ─── TARGET CANVAS ───────────────────────────────────────────────────────────

function TargetCanvas({ segments, winner, animating, size }) {
  const canvasRef = useRef(null);
  const rafRef    = useRef(null);
  const saucisseImg = useSaucisseImg();
  const S = size, CX = S/2;
  const R_OUT = S*0.44, R_MID = S*0.30, R_IN = S*0.16;

  const drawBoard = useCallback((ctx, highlight) => {
    ctx.fillStyle = C.board;
    ctx.fillRect(0, 0, S, S);
    ctx.strokeStyle = C.boardLine; ctx.lineWidth = 1;
    for (let i = 0; i < S; i += S/16) {
      ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,S); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(S,i); ctx.stroke();
    }
    if (segments.length === 0) {
      ctx.fillStyle = C.chalkDim;
      ctx.font = `bold ${S*0.035}px 'Courier New'`;
      ctx.textAlign = "center";
      ctx.fillText("AUCUN MILITAIRE", CX, CX-10);
      ctx.fillText("ENREGISTRÉ", CX, CX+14);
      return;
    }
    segments.forEach((seg, i) => {
      const sa = seg.start*Math.PI*2 - Math.PI/2;
      const ea = seg.end  *Math.PI*2 - Math.PI/2;
      const col = PALETTE[i % PALETTE.length];
      const isW = highlight && winner && seg.id === winner.id;
      ctx.beginPath(); ctx.moveTo(CX,CX);
      ctx.arc(CX, CX, R_OUT, sa, ea); ctx.closePath();
      ctx.fillStyle = isW ? col : col+"bb";
      if (isW) { ctx.shadowColor = col; ctx.shadowBlur = 18; }
      ctx.fill(); ctx.shadowBlur = 0;
      ctx.strokeStyle = C.bgPanel; ctx.lineWidth = 1.5; ctx.stroke();
      const mid = (sa+ea)/2, frac = seg.end - seg.start;
      if (frac > 0.045) {
        const lx = CX + R_OUT*0.72*Math.cos(mid);
        const ly = CX + R_OUT*0.72*Math.sin(mid);
        ctx.save(); ctx.translate(lx,ly); ctx.rotate(mid+Math.PI/2);
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${S*0.025}px 'Courier New'`;
        ctx.textAlign = "center";
        const n = seg.name.split(" ")[0];
        ctx.fillText(n.length>7 ? n.slice(0,6)+"." : n, 0, 0);
        ctx.restore();
      }
    });
    ctx.beginPath(); ctx.arc(CX,CX,R_MID,0,Math.PI*2);
    ctx.fillStyle = C.board+"ee"; ctx.fill();
    ctx.strokeStyle = C.chalkFaint; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX,CX,R_IN,0,Math.PI*2);
    ctx.fillStyle = C.board; ctx.fill();
    ctx.strokeStyle = C.chalkDim; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX,CX,S*0.045,0,Math.PI*2);
    ctx.fillStyle = C.red; ctx.shadowColor="#ff0000"; ctx.shadowBlur=12;
    ctx.fill(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(CX,CX,S*0.018,0,Math.PI*2);
    ctx.fillStyle = C.chalk; ctx.fill();
    ctx.strokeStyle = C.chalkFaint; ctx.lineWidth=1;
    ctx.setLineDash([3,5]);
    ctx.beginPath(); ctx.moveTo(CX,0); ctx.lineTo(CX,S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,CX); ctx.lineTo(S,CX); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(CX,CX,R_OUT+2,0,Math.PI*2);
    ctx.strokeStyle = C.chalkDim; ctx.lineWidth=2; ctx.stroke();
  }, [segments, winner, S, CX, R_OUT, R_MID, R_IN]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    cancelAnimationFrame(rafRef.current);

    if (!animating) {
      drawBoard(ctx, !!winner);
      if (winner) {
        const seg = segments.find(s => s.id === winner.id);
        if (seg) {
          const mid = ((seg.start+seg.end)/2)*Math.PI*2 - Math.PI/2;
          const sx = CX + R_OUT*0.72*Math.cos(mid);
          const sy = CX + R_OUT*0.72*Math.sin(mid);
          drawSaucisseImg(ctx, saucisseImg, sx, sy, mid + Math.PI/2, S/400);
        }
      }
      return;
    }

    // Animation vol
    const state = { angle: -0.3, spin: 0.06 };
    const targetSeg = winner ? segments.find(s => s.id === winner.id) : null;
    const tAngle = targetSeg
      ? ((targetSeg.start+targetSeg.end)/2)*Math.PI*2 - Math.PI/2 : 0;
    const tX = CX + R_OUT*0.72*Math.cos(tAngle);
    const tY = CX + R_OUT*0.72*Math.sin(tAngle);
    const finalAngle = tAngle + Math.PI/2;

    let t = 0, dur = 110;
    function step() {
      t++;
      const prog = t/dur;
      const ease = 1 - Math.pow(1-prog, 3);
      const wobble = (1-ease)*28;
      const cx = CX*(1-ease) + tX*ease + (Math.random()-0.5)*wobble;
      const cy = -S*0.15 + (tY+S*0.15)*ease + (Math.random()-0.5)*wobble*0.4;
      const curAngle = state.angle + (finalAngle - state.angle) * ease;
      // ailes battent en début de vol
      const wingFlap = Math.sin(t * 0.4) * (1-ease) * 0.3;

      drawBoard(ctx, false);
      // ombre
      ctx.save(); ctx.globalAlpha = 0.18;
      drawSaucisseImg(ctx, saucisseImg, cx+4, cy+6, curAngle, S/400 * (0.7 + ease*0.3));
      ctx.restore();
      ctx.globalAlpha = 1;
      drawSaucisseImg(ctx, saucisseImg, cx, cy, curAngle + wingFlap, S/400 * (0.7 + ease*0.3));

      if (t < dur) rafRef.current = requestAnimationFrame(step);
      else {
        drawBoard(ctx, true);
        drawSaucisseImg(ctx, saucisseImg, tX, tY, finalAngle, S/400);
      }
    }
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [animating, segments, winner, drawBoard, S, CX, R_OUT]);

  return (
    <canvas ref={canvasRef} width={S} height={S}
      style={{
        width:"100%", height:"auto", borderRadius:"50%",
        border:`3px solid ${C.borderLight}`,
        boxShadow:`0 4px 24px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.3)`,
        display:"block",
      }}
    />
  );
}

// ─── LISTES SAUVEGARDÉES ─────────────────────────────────────────────────────

function useSavedLists() {
  const [lists, setLists] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const res = await window.storage.get("sv-lists");
        if (res) setLists(JSON.parse(res.value));
      } catch(_) {}
      setLoading(false);
    }
    load();
  }, []);

  async function saveList(name, soldiers) {
    const updated = [
      ...lists.filter(l => l.name !== name),
      { name, soldiers, savedAt: new Date().toLocaleDateString("fr-FR") }
    ];
    setLists(updated);
    await window.storage.set("sv-lists", JSON.stringify(updated));
  }

  async function deleteList(name) {
    const updated = lists.filter(l => l.name !== name);
    setLists(updated);
    await window.storage.set("sv-lists", JSON.stringify(updated));
  }

  return { lists, loading, saveList, deleteList };
}

    // ── APP REACT (React.createElement, zéro JSX, zéro Babel) ──

// ─── RACCOURCIS ──────────────────────────────────────────────────────────────
const e  = React.createElement;
const {useState, useRef, useEffect, useCallback} = React;

// ─── HELPER : crée un élément avec style inline fusionné ─────────────────────
function h(type, props, ...children) {
  return e(type, props, ...children.flat().filter(c => c !== null && c !== false && c !== undefined));
}

// ─── COMPOSANTS ──────────────────────────────────────────────────────────────

function Label({children}) {
  return h('div', {style:{fontSize:10,letterSpacing:3,color:C.chalkFaint,marginBottom:4,textTransform:'uppercase'}}, children);
}

function SaucisseIcon({size=40}) {
  return h('img', {src:SAUCISSE_URL, width:size, height:size, alt:'saucisse volante', style:{display:'block'}});
}

function TargetCanvas({segments, winner, animating, size}) {
  const canvasRef = useRef(null);
  const rafRef    = useRef(null);
  const saucisseImg = useSaucisseImg();
  const S = size, CX = S/2;
  const R_OUT = S*0.44, R_MID = S*0.30, R_IN = S*0.16;

  const drawBoard = useCallback((ctx, highlight) => {
    ctx.fillStyle = C.board;
    ctx.fillRect(0,0,S,S);
    ctx.strokeStyle = C.boardLine; ctx.lineWidth=1;
    for(let i=0;i<S;i+=S/16){
      ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,S);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(S,i);ctx.stroke();
    }
    if(segments.length===0){
      ctx.fillStyle=C.chalkDim;
      ctx.font=`bold ${S*0.035}px 'Courier New'`;
      ctx.textAlign='center';
      ctx.fillText('AUCUN MILITAIRE',CX,CX-10);
      ctx.fillText('ENREGISTRÉ',CX,CX+14);
      return;
    }
    segments.forEach((seg,i)=>{
      const sa=seg.start*Math.PI*2-Math.PI/2;
      const ea=seg.end*Math.PI*2-Math.PI/2;
      const col=PALETTE[i%PALETTE.length];
      const isW=highlight&&winner&&seg.id===winner.id;
      ctx.beginPath();ctx.moveTo(CX,CX);
      ctx.arc(CX,CX,R_OUT,sa,ea);ctx.closePath();
      ctx.fillStyle=isW?col:col+'bb';
      if(isW){ctx.shadowColor=col;ctx.shadowBlur=18;}
      ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=C.bgPanel;ctx.lineWidth=1.5;ctx.stroke();
      const mid=(sa+ea)/2,frac=seg.end-seg.start;
      if(frac>0.045){
        const lx=CX+R_OUT*0.72*Math.cos(mid);
        const ly=CX+R_OUT*0.72*Math.sin(mid);
        ctx.save();ctx.translate(lx,ly);ctx.rotate(mid+Math.PI/2);
        ctx.fillStyle='#fff';
        ctx.font=`bold ${S*0.025}px 'Courier New'`;
        ctx.textAlign='center';
        const n=seg.name.split(' ')[0];
        ctx.fillText(n.length>7?n.slice(0,6)+'.':n,0,0);
        ctx.restore();
      }
    });
    ctx.beginPath();ctx.arc(CX,CX,R_MID,0,Math.PI*2);
    ctx.fillStyle=C.board+'ee';ctx.fill();
    ctx.strokeStyle=C.chalkFaint;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(CX,CX,R_IN,0,Math.PI*2);
    ctx.fillStyle=C.board;ctx.fill();
    ctx.strokeStyle=C.chalkDim;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(CX,CX,S*0.045,0,Math.PI*2);
    ctx.fillStyle=C.red;ctx.shadowColor='#ff0000';ctx.shadowBlur=12;
    ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(CX,CX,S*0.018,0,Math.PI*2);
    ctx.fillStyle=C.chalk;ctx.fill();
    ctx.strokeStyle=C.chalkFaint;ctx.lineWidth=1;
    ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,S);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,CX);ctx.lineTo(S,CX);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(CX,CX,R_OUT+2,0,Math.PI*2);
    ctx.strokeStyle=C.chalkDim;ctx.lineWidth=2;ctx.stroke();
  }, [segments, winner, S, CX, R_OUT, R_MID, R_IN]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    cancelAnimationFrame(rafRef.current);
    if(!animating){
      drawBoard(ctx,!!winner);
      if(winner){
        const seg=segments.find(s=>s.id===winner.id);
        if(seg){
          const mid=((seg.start+seg.end)/2)*Math.PI*2-Math.PI/2;
          const sx=CX+R_OUT*0.72*Math.cos(mid);
          const sy=CX+R_OUT*0.72*Math.sin(mid);
          drawSaucisseImg(ctx,saucisseImg,sx,sy,mid+Math.PI/2,S/400);
        }
      }
      return;
    }
    const state={angle:-0.3,spin:0.06};
    const targetSeg=winner?segments.find(s=>s.id===winner.id):null;
    const tAngle=targetSeg?((targetSeg.start+targetSeg.end)/2)*Math.PI*2-Math.PI/2:0;
    const tX=CX+R_OUT*0.72*Math.cos(tAngle);
    const tY=CX+R_OUT*0.72*Math.sin(tAngle);
    const finalAngle=tAngle+Math.PI/2;
    let t=0,dur=110;
    function step(){
      t++;
      const prog=t/dur;
      const ease=1-Math.pow(1-prog,3);
      const wobble=(1-ease)*28;
      const cx=CX*(1-ease)+tX*ease+(Math.random()-0.5)*wobble;
      const cy=-S*0.15+(tY+S*0.15)*ease+(Math.random()-0.5)*wobble*0.4;
      const curAngle=state.angle+(finalAngle-state.angle)*ease;
      const wingFlap=Math.sin(t*0.4)*(1-ease)*0.3;
      drawBoard(ctx,false);
      ctx.save();ctx.globalAlpha=0.18;
      drawSaucisseImg(ctx,saucisseImg,cx+4,cy+6,curAngle,S/400*(0.7+ease*0.3));
      ctx.restore();ctx.globalAlpha=1;
      drawSaucisseImg(ctx,saucisseImg,cx,cy,curAngle+wingFlap,S/400*(0.7+ease*0.3));
      if(t<dur)rafRef.current=requestAnimationFrame(step);
      else{
        drawBoard(ctx,true);
        drawSaucisseImg(ctx,saucisseImg,tX,tY,finalAngle,S/400);
      }
    }
    rafRef.current=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(rafRef.current);
  },[animating,segments,winner,drawBoard,S,CX,R_OUT,saucisseImg]);

  return h('canvas',{ref:canvasRef,width:S,height:S,style:{
    width:'100%',height:'auto',borderRadius:'50%',
    border:`3px solid ${C.borderLight}`,
    boxShadow:'0 4px 24px rgba(0,0,0,0.5),inset 0 0 40px rgba(0,0,0,0.3)',
    display:'block'
  }});
}

  const [soldiers,setSoldiers]     = useState([]);
  const [form,setForm]             = useState({name:'',grade:GRADES[0],anciennete:0});
  const [winner,setWinner]         = useState(null);
  const [animating,setAnimating]   = useState(false);
  const [task,setTask]             = useState('');
  const [editId,setEditId]         = useState(null);
  const [tab,setTab]               = useState('effectif');
  const {lists,loading,saveList,deleteList} = useSavedLists();
  const [saveModal,setSaveModal]   = useState(false);
  const [saveName,setSaveName]     = useState('');
  const [saveMsg,setSaveMsg]       = useState('');

  const segments = buildSegments(soldiers);
  const totalPts = GRADE_POINTS[form.grade]+Number(form.anciennete);
  const canFire  = soldiers.length>=2&&!animating;

  function addSoldier(){
    if(!form.name.trim())return;
    const totalPoints=GRADE_POINTS[form.grade]+Number(form.anciennete);
    if(editId!==null){
      setSoldiers(soldiers.map(s=>s.id===editId
        ?{...s,name:form.name,grade:form.grade,anciennete:Number(form.anciennete),totalPoints}:s));
      setEditId(null);
    }else{
      setSoldiers([...soldiers,{id:Date.now(),name:form.name,grade:form.grade,anciennete:Number(form.anciennete),totalPoints}]);
    }
    setForm({name:'',grade:GRADES[0],anciennete:0});
  }
  function removeSoldier(id){
    setSoldiers(s=>s.filter(x=>x.id!==id));
    if(winner&&winner.id===id)setWinner(null);
  }
  function startEdit(s){
    setForm({name:s.name,grade:s.grade,anciennete:s.anciennete});
    setEditId(s.id);setTab('effectif');
  }
  function lancerLaSaucisse(){
    if(!canFire)return;
    setWinner(null);setTab('cible');setAnimating(true);
    const w=pickWinner(segments);
    setTimeout(()=>{setAnimating(false);setWinner(w);},3300);

    setSoldiers(lst.soldiers.map(s=>({...s,id:Date.now()+Math.random()})));

    // Layout
    h('div',{className:'main-layout',style:{display:'flex',minHeight:'calc(100vh - 108px)'}},
      panelLeft, panelCenter, panelRight
    ),
    // Modal sauvegarde
    saveModal&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}},
      h('div',{style:{background:C.bgPanel,border:`2px solid ${C.border}`,borderRadius:6,padding:24,width:'90%',maxWidth:360}},
        h('div',{style:{fontWeight:'bold',fontSize:14,letterSpacing:2,marginBottom:16}},'💾 SAUVEGARDER LA LISTE'),
        h('input',{value:saveName,onChange:ev=>setSaveName(ev.target.value),placeholder:'Nom de la liste (ex: Section Alpha)',style:{...IS,marginBottom:12},onKeyDown:ev=>ev.key==='Enter'&&handleSave(),autoFocus:true}),
        saveMsg&&h('div',{style:{color:'#6BAF6B',fontSize:12,marginBottom:10}},saveMsg),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:handleSave,style:{...BP,flex:1}},'SAUVEGARDER'),
          h('button',{onClick:()=>setSaveModal(false),style:{...BG,flex:1}},'ANNULER')
        )
      )
    ),
    // CSS
    h('style',null,`
      @keyframes blink{50%{opacity:0}}
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      select option{background:#1A2B1A;color:#E8DFC0}
      *{box-sizing:border-box}
      ::-webkit-scrollbar{width:4px}
      ::-webkit-scrollbar-track{background:${C.bgPanel}}
      ::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}
      @media(min-width:700px){
        .mobile-tabs{display:none!important}
        .panel-left,.panel-center,.panel-right{display:flex!important}
        .hidden-mobile{display:flex!important}
        .main-layout{flex-direction:row!important}
      }
      @media(max-width:699px){
        .mobile-tabs{display:flex!important}
        .panel-left{flex:1!important;border-right:none!important;min-height:calc(100vh - 108px)}
        .panel-center{flex:1!important;min-height:calc(100vh - 108px)}
        .panel-right{flex:1!important;border-left:none!important;min-height:calc(100vh - 108px)}
        .hidden-mobile{display:none!important}
        .main-layout{flex-direction:column!important}
        .desktop-save{display:none!important}
      }
    `)
  );
}

    // ── DÉMARRAGE (appelé après chargement React) ──
    function startApp() {
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(SaucisseVolante));
        setTimeout(function(){
          var s = document.getElementById('splash');
          if(s){ s.style.opacity='0'; setTimeout(function(){s.remove();},500); }
        }, 500);
      } catch(err) {
        console.error('Erreur démarrage:', err);
        var s = document.getElementById('splash');
        if(s) s.innerHTML = '<p style="color:#C8A84B;font-family:monospace;padding:20px;text-align:center">⚠ Erreur: ' + err.message + '</p>';
      }
    }

    // ── SERVICE WORKER ──
    // Service Worker UNIQUEMENT en HTTPS
    if('serviceWorker' in navigator && location.protocol==='https:'){
      const sw=`const C='sv2';self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(['https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js']).catch(()=>{})));}); self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));}); `;
      const blob=new Blob([sw],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
    }
  </script>
